apiVersion: apps/v1
kind: Deployment
metadata:
  name: connections-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: connections-service
  template:
    metadata:
      labels:
        app: connections-service
    spec:
      containers:
        - name: connections-service
          image: yasiffkhan/jobseekers:connections-service
          resources:
            limits:
              memory: "400Mi"
              cpu: "200m"
            requests:
              memory: "200Mi"
              cpu: "100m"
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: k8s
#            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
#              value: http://discovery-server:8761/eureka
            - name: SPRING_NEO4J_URI
              value: bolt://connections-db:7687
            - name: SPRING_NEO4J_AUTHENTICATION_USERNAME
              value: neo4j
            - name: SPRING_NEO4J_AUTHENTICATION_PASSWORD
              value: password
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092
          ports:
            - containerPort: 9030
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 9030
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 9030
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5

---

apiVersion: v1
kind: Service
metadata:
  name: connections-service
spec:
  type: ClusterIP
  selector:
    app: connections-service
  ports:
    - port: 9030
      targetPort: 9030
      protocol: TCP