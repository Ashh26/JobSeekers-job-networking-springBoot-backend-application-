apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: connections-db
  labels:
    app: connections-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: connections-db
  serviceName: "connections-db"
  template:
    metadata:
      labels:
        app: connections-db
    spec:
      containers:
        - name: connections-db
          image: neo4j:5.15
          resources:
            limits:
              cpu: "200m"
              memory: "1Gi"
            requests:
              cpu: "100m"
              memory: "500Mi"
          ports:
            - containerPort: 7687
              name: bolt
            - containerPort: 7474
              name: http
          env:
            - name: NEO4J_AUTH
              value: "neo4j/password"
            - name: NEO4J_dbms_memory_heap_initial__size
              value: "256M"
            - name: NEO4J_dbms_memory_heap_max__size
              value: "512M"
            - name: NEO4J_dbms_default__listen__address
              value: "0.0.0.0"
            - name: NEO4J_ACCEPT_LICENSE_AGREEMENT
              value: "yes"
          volumeMounts:
            - name: neo4j-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: neo4j-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
        storageClassName: "standard"

---
apiVersion: v1
kind: Service
metadata:
  name: connections-db
  labels:
    app: connections-db
spec:
  clusterIP: None
  ports:
    - port: 7687
      targetPort: 7687
      name: bolt
    - port: 7474
      targetPort: 7474
      name: http
  selector:
    app: connections-db